name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What would you like Strata to do?
    validations:
      required: true
  - type: textarea
    id: use-case
    attributes:
      label: Use Case
      description: Why is this useful? What problem does it solve for you?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Have you found any workarounds or alternative approaches?
    validations:
      required: false
  - type: textarea
    id: extra
    attributes:
      label: Additional Context
      description: Screenshots, mockups, references to other tools, etc.
    validations:
      required: false
