name: Bug Report
description: Report something that isn't working correctly
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Open a file…
        2. Navigate to…
        3. See error…
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true
  - type: input
    id: macos-version
    attributes:
      label: macOS Version
      placeholder: e.g. macOS 15.3
    validations:
      required: true
  - type: input
    id: strata-version
    attributes:
      label: Strata Version
      placeholder: e.g. 1.0.0
    validations:
      required: true
  - type: textarea
    id: extra
    attributes:
      label: Additional Context
      description: Screenshots, sample files, crash logs, or anything else that might help.
    validations:
      required: false
